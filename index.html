<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bushra Shaikh</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        .btn {
            display: inline-block;
            margin: 15px;
            padding: 12px 25px;
            font-size: 16px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .linkedin {
            background-color: #0a66c2;
        }

        .github {
            background-color: #24292e;
        }

        .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <h1>Bushra Shaikh</h1>
    <p>Data Science Student | Learner</p>

    <!-- LinkedIn Button -->
    <a 
       href="https://www.linkedin.com/in/YOUR-LINKEDIN-USERNAME" 
       class="btn linkedin" 
       target="_blank">
       LinkedIn
    </a>

    <!-- GitHub Button -->
    <a 
       href="https://github.com/YOUR-GITHUB-USERNAME" 
       class="btn github" 
       target="_blank">
       GitHub
    </a>

</body>
</html>
